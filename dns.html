<h2>Domain Name System (DNS)</h2>
<img src="images/dns.jpg" alt="DNS">


<p>DNS translates domain names into IP addresses.</p>

<p>It queries servers to resolve names into IP addresses.</p>

<p>google.com → 142.x.x.x</p>

<p>Makes internet easier to use.</p>
